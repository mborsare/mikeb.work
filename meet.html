<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <title>Meet me · PRIME</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    :root {
      --bg: #000000;
      --done-bg: #071107;
      --text: #c0c0c0;
      --seal: #eaffea;
      --dim: rgba(234, 255, 234, 0.45);
      --line: rgba(234, 255, 234, 0.22);
      --control-h: 4.5rem;
      --control-radius: 0.85rem;
    }

    html {
      font-size: 14px;
    }

    @font-face {
      font-family: "ComicMono";
      src: url("/fonts/ComicMono-Regular.woff") format("woff");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    * {
      box-sizing: border-box;
    }

    a {
      color: var(--seal);
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--text);
      font-family: "ComicMono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      line-height: 1.5;
      text-align: center;
      transition: background-color 420ms ease;
    }

    body.done {
      background: var(--done-bg);
    }

    main {
      width: min(100%, 34rem);
      padding: clamp(1.25rem, 5vw, 2.5rem);
    }

    body.done main {
      display: grid;
      align-content: start;
    }

    .top {
      display: grid;
      justify-items: center;
      gap: 0.35rem;
      margin-bottom: 3rem;
      color: var(--dim);
      font-size: 0.85rem;
    }

    #clock {
      opacity: 0.55;
      filter: blur(0.2px);
    }

    h1 {
      margin: 0 0 0.5rem;
      color: var(--seal);
      font-size: clamp(2rem, 9vw, 2.5rem);
      font-weight: 400;
    }

    body.done h1 {
      margin-bottom: 1.5rem;
    }

    .sub {
      margin: 0 0 2rem;
      font-size: 1rem;
    }

    form {
      display: grid;
      gap: 1.25rem;
    }

    label {
      display: grid;
      gap: 0.55rem;
      font-size: 0.9rem;
      text-align: center;
    }

    input,
    textarea,
    button {
      width: 100%;
      height: var(--control-h);
      min-height: var(--control-h);
      border: 1px solid var(--line);
      border-radius: var(--control-radius);
      background: rgba(234, 255, 234, 0.035);
      color: var(--seal);
      font: inherit;
      font-size: 1.15rem;
      line-height: 1;
      text-align: center;
      padding: 0 1rem;
      outline: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      appearance: none;
      -webkit-appearance: none;
    }

    input[type="date"],
    input[type="time"] {
      font-size: 1.15rem;
      color-scheme: dark;
      cursor: pointer;
    }

    input:focus,
    textarea:focus {
      border-color: var(--seal);
    }

    input::placeholder,
    textarea::placeholder {
      color: rgba(192, 192, 192, 0.45);
    }

    textarea {
      height: 6rem;
      min-height: 6rem;
      line-height: 1.4;
      padding-block: 1rem;
      resize: vertical;
    }

    .presets {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 0.75rem;
      margin: 0.25rem 0 0.75rem;
    }

    .chip {
      min-height: var(--control-h);
      border: 1px solid var(--line);
      padding: 0 1rem;
      color: var(--text);
      cursor: pointer;
    }

    .chip:hover,
    .chip.active {
      color: var(--bg);
      background: var(--seal);
      border-color: var(--seal);
    }

    .send {
      min-height: var(--control-h);
      margin-top: 0.75rem;
      border: 1px solid var(--seal);
      color: var(--bg);
      background: var(--seal);
      cursor: pointer;
      transition: transform 120ms ease, opacity 120ms ease;
    }

    .send:active {
      transform: scale(0.98);
    }

    .send-help {
      display: block;
      margin-top: -0.65rem;
      color: var(--dim);
      font-size: 0.75rem;
      line-height: 1.4;
    }

    .fields {
      display: grid;
      gap: 1.25rem;
      opacity: 1;
      transform: translateY(0);
      max-height: 80rem;
      overflow: hidden;
      transition:
        opacity 220ms ease,
        transform 220ms ease,
        max-height 320ms ease;
    }

    .fields.hide {
      opacity: 0;
      transform: translateY(-0.5rem);
      max-height: 0;
      pointer-events: none;
    }

    .fallback {
      display: grid;
      gap: 0.85rem;
      align-self: start;
      margin-top: 0;
      padding: 1rem;
      border: 1px solid var(--line);
      border-radius: var(--control-radius);
      background: rgba(234, 255, 234, 0.035);
      opacity: 0;
      transform: translateY(0.5rem);
      pointer-events: none;
      max-height: 0;
      overflow: hidden;
      transition:
        opacity 320ms ease,
        transform 320ms ease,
        max-height 420ms ease,
        border-color 420ms ease,
        background-color 420ms ease;
    }

    .fallback.show {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
      max-height: 40rem;
      text-align: center;
      border-color: rgba(234, 255, 234, 0.38);
      background: rgba(234, 255, 234, 0.06);
    }

    .fallback p {
      margin: 0;
      font-size: 0.85rem;
      color: var(--text);
    }

    .fallback textarea {
      height: auto;
      min-height: 14rem;
      overflow: hidden;
      font-size: 0.9rem;
      line-height: 1.45;
      text-align: left;
    }

    .actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 0.75rem;
    }

    .copy,
    .again {
      height: 3.5rem;
      min-height: 3.5rem;
      color: var(--seal);
      cursor: pointer;
      font-size: 0.85rem;
    }

    @media (max-width: 36rem) {
      .actions {
        grid-template-columns: 1fr;
      }
    }

    .foot {
      margin-top: 2rem;
      font-size: 0.8rem;
      opacity: 0.8;
    }

    @media (max-width: 36rem) {
      main {
        padding-inline: 1rem;
      }

      h1 {
        font-size: clamp(2.4rem, 12vw, 4.25rem);
      }

      input,
      textarea,
      button {
        font-size: 1.1rem;
      }
    }
  </style>
</head>

<body>
  <main>
    <div class="top">
      <a href="/">mikeb.work</a>
      <time id="clock"></time>
    </div>

    <h1 id="headline">When can you meet?</h1>
    <form id="pick-form">
      <div class="fields" id="fields">
        <label>
          your name
          <input id="name" name="name" type="text" placeholder="name" autocomplete="name" required />
        </label>

        <label>
          date
          <input id="date" name="date" type="date" required />
        </label>

        <label>
          time
          <input id="time" name="time" type="time" required />
        </label>

        <div class="presets" aria-label="preset times">
          <button class="chip" type="button" data-time="09:30">09:30</button>
          <button class="chip" type="button" data-time="12:00">12:00</button>
          <button class="chip" type="button" data-time="14:30">14:30</button>
          <button class="chip" type="button" data-time="16:00">16:00</button>
        </div>

        <label>
          note
          <textarea id="note" name="note" placeholder="optional"></textarea>
        </label>

        <button class="send" type="submit">send</button>
        <sub class="send-help">this will email Mike using your email client</sub>
      </div>

      <div class="fallback" id="fallback" aria-live="polite">
        <p>If nothing opened, copy this and send it to mborsare@gmail.com.</p>
        <textarea id="fallback-text" readonly></textarea>
        <div class="actions">
          <button class="copy" id="copy" type="button">copy</button>
          <button class="again" id="again" type="button">add another time</button>
        </div>
      </div>
    </form>

    <p class="foot">mailto: mborsare@gmail.com</p>
  </main>

  <script>
    (() => {
      const clock = document.getElementById("clock");
      let pulseT = 0;

      function updateClock() {
        const now = new Date();
        const days = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
        const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];

        clock.textContent =
          `${days[now.getDay()]} ${months[now.getMonth()]} ${now.getDate()} ` +
          `${String(now.getHours()).padStart(2, "0")}:` +
          `${String(now.getMinutes()).padStart(2, "0")}:` +
          `${String(now.getSeconds()).padStart(2, "0")}`;
      }

      function pulse() {
        pulseT += 0.025;
        clock.style.opacity = 0.35 + (Math.sin(pulseT) + 1) * 0.15;
        requestAnimationFrame(pulse);
      }

      updateClock();
      setInterval(updateClock, 250);
      pulse();
    })();

    (() => {
      const headline = document.getElementById("headline");
      const name = document.getElementById("name");
      const date = document.getElementById("date");
      const time = document.getElementById("time");
      const note = document.getElementById("note");
      const form = document.getElementById("pick-form");
      const fields = document.getElementById("fields");
      const fallback = document.getElementById("fallback");
      const fallbackText = document.getElementById("fallback-text");
      const copy = document.getElementById("copy");
      const again = document.getElementById("again");
      const chips = [...document.querySelectorAll(".chip")];

      const picks = [];
      const today = new Date();

      function setToday() {
        date.value = today.toISOString().slice(0, 10);
      }

      function clearPickFields() {
        time.value = "";
        note.value = "";
        chips.forEach((item) => item.classList.remove("active"));
      }

      function buildMessage() {
        const selectedName = name.value.trim();
        const pickLines = picks.map((pick, index) => {
          const parts = [
            `${index + 1}. ${pick.date} at ${pick.time}`,
            pick.note ? `   Note: ${pick.note}` : ""
          ];

          return parts.filter(Boolean).join("\n");
        });

        const subject =
          picks.length === 1
            ? `meeting time pick — ${selectedName} — ${picks[0].date} ${picks[0].time}`
            : `meeting time picks — ${selectedName}`;

        const body = [
          picks.length === 1 ? "Meeting time pick:" : "Meeting time picks:",
          "",
          `Name: ${selectedName}`,
          "",
          ...pickLines,
          "",
          "— sent from PRIME"
        ].filter(Boolean).join("\n");

        return {subject, body};
      }

      function showFallback() {
        const {subject, body} = buildMessage();

        fallbackText.value = `To: mborsare@gmail.com\nSubject: ${subject}\n\n${body}`;
        fallbackText.style.height = "auto";
        fallbackText.style.height = `${fallbackText.scrollHeight + 2}px`;
        headline.textContent = "See you then!";
        document.body.classList.add("done");
        fields.classList.add("hide");

        window.setTimeout(() => {
          fallback.classList.add("show");
        }, 120);

        const mailto =
          "mailto:mborsare@gmail.com" +
          `?subject=${encodeURIComponent(subject)}` +
          `&body=${encodeURIComponent(body)}`;

        window.location.href = mailto;
      }

      setToday();

      chips.forEach((chip) => {
        chip.addEventListener("click", () => {
          time.value = chip.dataset.time;
          chips.forEach((item) => item.classList.remove("active"));
          chip.classList.add("active");
        });
      });

      form.addEventListener("submit", (event) => {
        event.preventDefault();

        picks.push({
          date: date.value,
          time: time.value,
          note: note.value.trim()
        });

        showFallback();
      });

      again.addEventListener("click", () => {
        fallback.classList.remove("show");
        headline.textContent = "When can you meet?";
        document.body.classList.remove("done");

        window.setTimeout(() => {
          fields.classList.remove("hide");
          clearPickFields();
          time.focus();
        }, 180);
      });

      copy.addEventListener("click", async () => {
        try {
          await navigator.clipboard.writeText(fallbackText.value);
          copy.textContent = "copied";
          setTimeout(() => {
            copy.textContent = "copy";
          }, 1400);
        } catch {
          fallbackText.focus();
          fallbackText.select();
          copy.textContent = "select + copy";
        }
      });
    })();
  </script>
</body>

</html>
