<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <title>Mike Borsare — The Paper</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    :root {
      --bg: #000000;
      --text: #c0c0c0;
      --stamp: #888888;
      --seal: #eaffea;
      --dim: #1a1a1a;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    @font-face {
      font-family: 'ComicMono';
      src: url('/fonts/ComicMono-Regular.woff') format('woff');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    body {
      font-family: 'ComicMono', monospace;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ── */
    .header {
      flex-shrink: 0;
      text-align: center;
      padding: clamp(0.4rem, 1.5vw, 0.9rem) clamp(0.75rem, 2vw, 1.25rem);
      border-bottom: 1px solid #1a1a1a;
    }

    h1 {
      color: var(--bg);
      font-size: 0.275rem;
      margin: 0;
    }

    .header-row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 1rem;
      margin-top: 0.3rem;
    }

    nav a {
      color: var(--stamp);
      text-decoration: none;
      font-size: 0.75rem;
      letter-spacing: 0.05rem;
    }

    nav a:hover {
      color: var(--seal);
    }

    #clock {
      color: var(--seal);
      opacity: 0.45;
      filter: blur(0.25px);
      display: inline-block;
      font-size: 0.75rem;
    }

    /* ── TOGGLE ── */
    .toggle-label {
      display: inline-flex;
      align-items: baseline;
      gap: 0.35rem;
      cursor: pointer;
      font-size: 0.75rem;
      color: var(--stamp);
      letter-spacing: 0.05rem;
      user-select: none;
      transition: color 0.15s;
    }

    .toggle-label:hover {
      color: var(--seal);
    }

    .toggle-label input[type='checkbox'] {
      appearance: none;
      -webkit-appearance: none;
      width: 0.65rem;
      height: 0.65rem;
      border: 1px solid var(--stamp);
      background: transparent;
      cursor: pointer;
      position: relative;
      top: 0.05rem;
      flex-shrink: 0;
      transition: border-color 0.15s, background 0.15s;
    }

    .toggle-label input[type='checkbox']:checked {
      background: var(--seal);
      border-color: var(--seal);
    }

    .toggle-label input[type='checkbox']:checked::after {
      content: '';
      display: block;
      position: absolute;
      inset: 1px;
      background: var(--bg);
      clip-path: polygon(14% 44%, 0 65%, 50% 100%, 100% 16%, 80% 0%, 43% 62%);
    }

    /* huge overrides */
    body.huge .row-0 .headline {
      font-size: 4.5rem;
      letter-spacing: -0.02em;
    }

    body.huge .row-1 .headline {
      font-size: 3.2rem;
      letter-spacing: -0.01em;
    }

    body.huge .row-2 .headline {
      font-size: 2.4rem;
      letter-spacing: 0.02em;
    }

    body.huge .row-3 .headline {
      font-size: 3.8rem;
      letter-spacing: -0.015em;
    }

    body.huge .src-badge {
      display: none;
    }

    body.huge .sep {
      font-size: 2rem;
      margin: 0 1.2rem;
    }

    /* ── STAGE ── */
    #stage {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
    }

    .marquee-stage {
      flex: 1;
      display: flex;
      align-items: center;
      overflow: hidden;
      border-bottom: 1px solid #111;
      cursor: grab;
      touch-action: pan-y;
    }

    .marquee-stage.dragging {
      cursor: grabbing;
    }

    .marquee-row {
      display: flex;
      white-space: nowrap;
      will-change: transform;
      user-select: none;
    }

    /* block link-click during and briefly after drag */
    .marquee-stage.dragging .marquee-item,
    .marquee-stage.drag-end .marquee-item {
      pointer-events: none;
    }

    .marquee-item {
      display: inline-flex;
      align-items: center;
      padding: 0 0.4rem;
      text-decoration: none;
    }

    .marquee-item:hover .headline {
      color: #ffffff;
    }

    .marquee-item:hover .sep {
      color: var(--seal);
    }

    .row-0 .headline {
      color: var(--seal);
      font-size: 1.05rem;
    }

    .row-1 .headline {
      color: #b0c8b0;
      font-size: 0.85rem;
    }

    .row-2 .headline {
      color: var(--stamp);
      font-size: 0.75rem;
      letter-spacing: 0.05rem;
    }

    .row-3 .headline {
      color: var(--seal);
      font-size: 0.95rem;
      opacity: 0.7;
    }

    .sep {
      color: #2a2a2a;
      margin: 0 0.75rem;
      user-select: none;
    }

    .src-badge {
      font-size: 0.55rem;
      letter-spacing: 0.15rem;
      text-transform: uppercase;
      color: var(--stamp);
      margin-right: 0.45rem;
      opacity: 0.6;
      flex-shrink: 0;
    }

    #status {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--stamp);
      font-size: 0.75rem;
      letter-spacing: 0.1rem;
      opacity: 0.6;
    }

    #status.err {
      color: #ff6b6b;
      opacity: 1;
    }

    #status.hidden {
      display: none;
    }
  </style>
</head>

<body>
  <div class="header">
    <h1>Mike Borsare</h1>
    <div class="header-row">
      <nav><a href="index.html">back</a></nav>
      <time id="clock"></time>
      <label class="toggle-label">
        <input type="checkbox" id="hugeToggle" /> huge
      </label>
    </div>
  </div>

  <div id="status">fetching feeds…</div>
  <div id="stage"></div>

  <script>
    // ── SCROLL STATE ──
    // All row states live here; huge-toggle recalc also uses this.
    let allStates = []

    // ── HUGE MODE ──
    const hugeToggle = document.getElementById('hugeToggle')
    if (hugeToggle) {
      hugeToggle.checked = localStorage.getItem('paper:huge') === '1'
      document.body.classList.toggle('huge', hugeToggle.checked)
      hugeToggle.addEventListener('change', () => {
        document.body.classList.toggle('huge', hugeToggle.checked)
        localStorage.setItem('paper:huge', hugeToggle.checked ? '1' : '0')
        requestAnimationFrame(() => {
          for (const s of allStates) {
            const newHalf = s.el.scrollWidth / 2
            if (s.halfWidth > 0 && newHalf > 0) {
              s.offset = s.offset * (newHalf / s.halfWidth)
            }
            s.halfWidth = newHalf || 1
          }
        })
      })
    }

    // ── CLOCK ──
    ; (() => {
      const clock = document.getElementById('clock')
      let t = 0
      const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat']
      const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec']

      function updateClock() {
        const now = new Date()
        clock.textContent =
          `${days[now.getDay()]} ${months[now.getMonth()]} ${now.getDate()} ` +
          `${String(now.getHours()).padStart(2, '0')}:` +
          `${String(now.getMinutes()).padStart(2, '0')}:` +
          `${String(now.getSeconds()).padStart(2, '0')}:` +
          `${String(now.getMilliseconds()).padStart(3, '0')}`
      }

      function pulse() {
        t += 0.02
        clock.style.opacity = 0.35 + (Math.sin(t) + 1) * 0.15
        requestAnimationFrame(pulse)
      }

      updateClock()
      setInterval(updateClock, 50)
      pulse()
    })()

    // ── FEED ──
    const SOURCES = [
      {label: 'NYT', rss: 'https://rss.nytimes.com/services/xml/rss/nyt/HomePage.xml'},
      {label: 'WAPO', rss: 'https://feeds.washingtonpost.com/rss/homepage'},
    ]
    const RSS2JSON = 'https://api.rss2json.com/v1/api.json?rss_url='
    const LIMIT = 20
    const CACHE_TTL = 1000 * 60 * 30
    const REFRESH_MS = 1000 * 60 * 10

    // 8 rows — 2× vertical density
    const ROW_CONFIGS = [
      {speed: 55, dir: 'rtl'},
      {speed: 38, dir: 'ltr'},
      {speed: 70, dir: 'rtl'},
      {speed: 45, dir: 'ltr'},
      {speed: 60, dir: 'rtl'},
      {speed: 42, dir: 'ltr'},
      {speed: 50, dir: 'rtl'},
      {speed: 35, dir: 'ltr'},
    ]

    function getCache(key) {
      try {
        const raw = localStorage.getItem(key)
        if (!raw) return null
        const parsed = JSON.parse(raw)
        if (Date.now() - parsed.time > CACHE_TTL) {
          localStorage.removeItem(key)
          return null
        }
        return parsed.data
      } catch {
        return null
      }
    }

    function setCache(key, data) {
      try {
        localStorage.setItem(key, JSON.stringify({time: Date.now(), data}))
      } catch { }
    }

    async function fetchSource(source) {
      const key = 'feed:' + source.label
      let items = getCache(key)

      if (!items) {
        const res = await fetch(RSS2JSON + encodeURIComponent(source.rss))
        const data = await res.json()
        if (data.status !== 'ok') throw new Error(data.message)
        items = (data.items || [])
          .slice(0, LIMIT)
          .filter((v, i, a) => a.findIndex((x) => x.link === v.link) === i)
        setCache(key, items)
      }

      return items.map((item) => ({
        title: item.title,
        link: 'https://archive.ph/newest/' + encodeURIComponent(item.link.replace(/\?.*/, '')),
        label: source.label,
      }))
    }

    function makeItems(items) {
      const frag = document.createDocumentFragment()

      items.forEach((item) => {
        const a = document.createElement('a')
        a.className = 'marquee-item'
        a.href = item.link
        a.target = '_blank'
        a.rel = 'noopener'

        const badge = document.createElement('span')
        badge.className = 'src-badge'
        badge.textContent = item.label

        const hl = document.createElement('span')
        hl.className = 'headline'
        hl.textContent = item.title

        const sep = document.createElement('span')
        sep.className = 'sep'
        sep.textContent = '◆'

        a.appendChild(badge)
        a.appendChild(hl)
        a.appendChild(sep)
        frag.appendChild(a)
      })

      return frag
    }

    // Clamp offset into [-halfWidth, 0] with modulo
    function normalise(offset, halfWidth) {
      if (halfWidth <= 0) return 0
      let o = offset % halfWidth
      if (o > 0) o -= halfWidth
      if (o <= -halfWidth) o += halfWidth
      return o
    }

    // ── DRAG ──
    function attachDrag(s, hitArea) {
      let pointerId = null
      let down = false
      let moved = false

      hitArea.addEventListener('pointerdown', (e) => {
        if (e.button !== 0) return
        down = true
        moved = false
        pointerId = e.pointerId
        s.dragging = false
        s.dragStartX = e.clientX
        s.dragStartOffset = s.offset
        s.dragDelta = 0
      })

      hitArea.addEventListener('pointermove', (e) => {
        if (!down || e.pointerId !== pointerId) return

        s.dragDelta = e.clientX - s.dragStartX

        if (!moved && Math.abs(s.dragDelta) > 4) {
          moved = true
          s.dragging = true
          hitArea.setPointerCapture(e.pointerId)
          hitArea.classList.add('dragging')
        }

        if (!moved) return

        s.offset = s.dragStartOffset + s.dragDelta
      })

      function endDrag(e) {
        if (!down || e.pointerId !== pointerId) return

        down = false

        if (s.dragging) {
          s.dragging = false
          hitArea.classList.remove('dragging')
          s.offset = normalise(s.offset, s.halfWidth)

          hitArea.classList.add('drag-end')
          setTimeout(() => hitArea.classList.remove('drag-end'), 150)
        }

        pointerId = null
      }

      hitArea.addEventListener('pointerup', endDrag)
      hitArea.addEventListener('pointercancel', endDrag)

      hitArea.addEventListener(
        'click',
        (e) => {
          if (Math.abs(s.dragDelta) > 4) {
            e.preventDefault()
            e.stopPropagation()
          }
        },
        true
      )
    }

    // ── RAF LOOP (single shared loop) ──
    let rafStarted = false

    function startRaf() {
      if (rafStarted) return
      rafStarted = true
      let last = null

      function frame(ts) {
        if (last === null) last = ts
        const dt = Math.min((ts - last) / 1000, 0.05)
        last = ts

        for (const s of allStates) {
          if (!s.dragging) {
            s.offset += s.pps * dt
            s.offset = normalise(s.offset, s.halfWidth)
          }
          s.el.style.transform = `translateX(${s.offset}px)`
        }

        requestAnimationFrame(frame)
      }

      requestAnimationFrame(frame)
    }

    // ── BUILD ──
    function buildRow(items, rowIndex) {
      const cfg = ROW_CONFIGS[rowIndex % ROW_CONFIGS.length]
      const el = document.createElement('div')
      el.className = `marquee-row row-${rowIndex % 4}`
      el.appendChild(makeItems(items))
      el.appendChild(makeItems(items))

      const s = {
        el,
        halfWidth: 1,
        pps: cfg.dir === 'rtl' ? -cfg.speed : cfg.speed,
        dir: cfg.dir,
        offset: 0,
        dragging: false,
        dragStartX: 0,
        dragStartOffset: 0,
        dragDelta: 0,
      }

      allStates.push(s)
      return s
    }

    function buildStage(allItems) {
      const stage = document.getElementById('stage')
      const statusEl = document.getElementById('status')
      stage.innerHTML = ''
      statusEl.classList.add('hidden')
      allStates = []

      const shuffle = (arr) => [...arr].sort(() => Math.random() - 0.5)
      const nyt = allItems.filter((i) => i.label === 'NYT')
      const wapo = allItems.filter((i) => i.label === 'WAPO')

      const rowSets = [
        allItems,
        nyt.length ? nyt : allItems,
        shuffle(allItems),
        wapo.length ? wapo : allItems,
        shuffle(allItems),
        wapo.length ? wapo : allItems,
        nyt.length ? shuffle(nyt) : shuffle(allItems),
        allItems,
      ]

      rowSets.forEach((items, i) => {
        if (!items.length) return

        const wrapper = document.createElement('div')
        wrapper.className = 'marquee-stage'

        const s = buildRow(items, i)
        wrapper.appendChild(s.el)

        attachDrag(s, wrapper)

        stage.appendChild(wrapper)
      })

      requestAnimationFrame(() =>
        requestAnimationFrame(() => {
          for (const s of allStates) {
            s.halfWidth = s.el.scrollWidth / 2 || 1
            s.offset = s.dir === 'ltr' ? -s.halfWidth : 0
          }
        })
      )

      startRaf()
    }

    async function load() {
      const statusEl = document.getElementById('status')

      try {
        const results = await Promise.all(SOURCES.map(fetchSource))
        const all = results.flat()

        if (!all.length) {
          statusEl.textContent = 'no items'
          return
        }

        buildStage(all)
      } catch (err) {
        statusEl.classList.remove('hidden')
        statusEl.classList.add('err')
        statusEl.textContent = err.message
      }
    }

    load()
    setInterval(load, REFRESH_MS)
  </script>
</body>

</html>
