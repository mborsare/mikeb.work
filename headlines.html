<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <title>mikeb.work/headlines</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    :root {
      --bg: #000000;
      --text: #c0c0c0;
      --stamp: #888888;
      --seal: #eaffea;
      --dim: #1a1a1a;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    @font-face {
      font-family: 'ComicMono';
      src: url('/fonts/ComicMono-Regular.woff') format('woff');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    body {
      font-family: 'ComicMono', monospace;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ── */
    .header {
      flex-shrink: 0;
      text-align: center;
      padding: clamp(0.4rem, 1.5vw, 0.9rem) clamp(0.75rem, 2vw, 1.25rem);
      border-bottom: 1px solid #1a1a1a;
    }

    h1 {
      display: none;
    }

    .header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      margin-top: 0.3rem;
    }

    nav a {
      color: var(--stamp);
      text-decoration: none;
      font-size: 0.75rem;
      letter-spacing: 0.05rem;
    }

    nav a:hover {
      color: var(--seal);
    }

    #clock {
      color: var(--seal);
      opacity: 0.45;
      filter: blur(0.25px);
      display: inline-block;
      letter-spacing: 0.12rem;
      white-space: nowrap;
    }

    /* ── TOGGLE ── */
    .toggle-label {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      cursor: pointer;
      font-size: 0.75rem;
      color: var(--stamp);
      letter-spacing: 0.05rem;
      user-select: none;
      transition: color 0.15s;
    }

    .toggle-label:hover {
      color: var(--seal);
    }

    .toggle-label input[type='checkbox'] {
      appearance: none;
      -webkit-appearance: none;
      width: 0.65rem;
      height: 0.65rem;
      border: 1px solid var(--stamp);
      background: transparent;
      cursor: pointer;
      position: relative;
      top: 0.05rem;
      flex-shrink: 0;
      transition: border-color 0.15s, background 0.15s;
    }

    .toggle-label input[type='checkbox']:checked {
      background: var(--seal);
      border-color: var(--seal);
    }

    .toggle-label input[type='checkbox']:checked::after {
      content: '';
      display: block;
      position: absolute;
      inset: 1px;
      background: var(--bg);
      clip-path: polygon(14% 44%, 0 65%, 50% 100%, 100% 16%, 80% 0%, 43% 62%);
    }

    /* ── COLOR CONTROLS ── */
    .header-controls {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }

    .control-button {
      appearance: none;
      -webkit-appearance: none;
      border: 0;
      background: transparent;
      color: var(--stamp);
      font: inherit;
      font-size: 0.75rem;
      letter-spacing: 0.05rem;
      padding: 0;
      cursor: pointer;
    }

    .control-button:hover {
      color: var(--seal);
    }

    .control-button:disabled {
      opacity: 0.35;
      cursor: default;
    }

    #colorSwatch {
      display: none;
      width: 2rem;
      height: 2rem;
      border: 1px solid var(--stamp);
      border-radius: 0.4rem;
      padding: 0;
      background: transparent;
      cursor: pointer;
      position: relative;
      top: 0.1rem;
      flex-shrink: 0;
      appearance: none;
      -webkit-appearance: none;
      overflow: hidden;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    #colorSwatch::-webkit-color-swatch-wrapper {
      padding: 0;
    }

    #colorSwatch::-webkit-color-swatch {
      border: none;
    }

    #colorSwatch::-moz-color-swatch {
      border: none;
    }

    #colorSwatch:hover {
      border-color: var(--seal);
      box-shadow: 0 0 0 1px var(--seal);
    }

    #colorToggle:checked~#colorSwatch {
      display: inline-block;
    }

    /* huge overrides */
    body.huge .row-0 .headline {
      font-size: 4.5rem;
      letter-spacing: -0.02em;
    }

    body.huge .row-1 .headline {
      font-size: 3.2rem;
      letter-spacing: -0.01em;
    }

    body.huge .row-2 .headline {
      font-size: 2.4rem;
      letter-spacing: 0.02em;
    }

    body.huge .row-3 .headline {
      font-size: 3.8rem;
      letter-spacing: -0.015em;
    }

    body.huge .src-badge {
      display: none;
    }

    body.huge .sep {
      font-size: 2rem;
      margin: 0 1.2rem;
    }

    /* ── STAGE ── */
    #stage {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
    }

    .marquee-stage {
      flex: 1;
      display: flex;
      align-items: center;
      overflow: hidden;
      border-bottom: 1px solid #111;
      cursor: grab;
      touch-action: pan-y;
    }

    .marquee-stage.dragging {
      cursor: grabbing;
    }

    .marquee-row {
      display: flex;
      white-space: nowrap;
      will-change: transform;
      user-select: none;
    }

    .marquee-stage.dragging .marquee-item,
    .marquee-stage.drag-end .marquee-item {
      pointer-events: none;
    }

    .marquee-item {
      display: inline-flex;
      align-items: center;
      padding: 0 0.4rem;
      text-decoration: none;
    }

    .marquee-item:hover .headline {
      color: #ffffff;
    }

    .marquee-item:hover .sep {
      color: var(--seal);
    }

    .row-0 .headline {
      color: var(--seal);
      font-size: 1.05rem;
    }

    .row-1 .headline {
      color: #b0c8b0;
      font-size: 0.85rem;
    }

    .row-2 .headline {
      color: var(--stamp);
      font-size: 0.75rem;
      letter-spacing: 0.05rem;
    }

    .row-3 .headline {
      color: var(--seal);
      font-size: 0.95rem;
      opacity: 0.7;
    }

    .sep {
      color: #2a2a2a;
      margin: 0 0.75rem;
      user-select: none;
    }

    .src-badge {
      font-size: 0.55rem;
      letter-spacing: 0.15rem;
      text-transform: uppercase;
      color: var(--stamp);
      margin-right: 0.45rem;
      opacity: 0.6;
      flex-shrink: 0;
    }

    #status {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--stamp);
      font-size: 0.75rem;
      letter-spacing: 0.1rem;
      opacity: 0.6;
    }

    #status.err {
      color: #ff6b6b;
      opacity: 1;
    }

    #status.hidden {
      display: none;
    }

    #stage.answer-cut {
      opacity: 0.12;
      filter: blur(2px);
    }

    #stage.answer-cut-settle {
      transition: opacity 180ms ease-out, filter 180ms ease-out;
      opacity: 1;
      filter: blur(0);
    }

    /* ── FEED STATUS BAR ── */
    #feed-status {
      flex-shrink: 0;
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto auto;
      align-items: center;
      gap: 0.55rem;
      padding: 1rem clamp(0.75rem, 2vw, 1.25rem);
      border-top: 1px solid #111;
      min-height: 0;
    }

    #feed-status nav {
      min-width: 0;
      justify-self: start;
    }

    #clock {
      min-width: max-content;
      justify-self: end;
    }

    #feed-pills {
      display: flex;
      min-width: 0;
      gap: 0.6rem;
      justify-content: flex-end;
      overflow: hidden;
    }

    .feed-pill {
      letter-spacing: 0.12rem;
      text-transform: uppercase;
      opacity: 0.4;
      transition: opacity 0.3s, color 0.3s;
    }

    .feed-pill.ok {
      color: var(--seal);
      opacity: 0.55;
    }

    .feed-pill.err {
      opacity: 0.2;
    }

    .feed-pill.loading {
      color: var(--stamp);
      opacity: 0.3;
    }

    /* ── NEON GLOW ── */
    .header pre {
      color: var(--seal);
      text-shadow:
        0 0 4px currentColor,
        0 0 16px currentColor,
        0 0 40px currentColor,
        0 0 80px currentColor;
      animation: neon-hue 3s linear infinite;
      display: inline-block;
    }

    @keyframes neon-hue {
      to {
        filter: hue-rotate(360deg);
      }
    }

    /* ── PHONE FIT ── */
    @media (max-width: 700px) {

      html,
      body {
        height: 100svh;
        overflow: hidden;
      }

      body {
        min-height: 100svh;
      }

      .header {
        padding: 0.45rem 0.65rem;
      }

      .header-row {
        display: flex;
        flex-direction: column;
        align-items: center;
        margin-top: 0;
      }

      .header pre {
        max-width: 100%;
        margin: 0;
        font-size: 0.4rem;
        overflow: hidden;
        white-space: pre;
      }

      .header-controls {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        gap: 2rem;
      }

      .control-button,
      .toggle-label {
        font-size: 0.62rem;
        letter-spacing: 0.035rem;
        line-height: 1;
      }

      .toggle-label {
        gap: 0.25rem;
      }

      .toggle-label input[type='checkbox'] {
        width: 0.72rem;
        height: 0.72rem;
        top: 0;
      }

      #colorSwatch {
        width: 1.45rem;
        height: 1.45rem;
        border-radius: 0.3rem;
        top: 0;
      }

      #stage {
        min-height: 0;
      }

      .marquee-stage {
        min-height: 0;
      }

      .marquee-item {
        padding: 0 0.25rem;
      }

      .row-0 .headline {
        font-size: 0.95rem;
      }

      .row-1 .headline {
        font-size: 0.78rem;
      }

      .row-2 .headline {
        font-size: 0.68rem;
        letter-spacing: 0.035rem;
      }

      .row-3 .headline {
        font-size: 0.85rem;
      }

      .src-badge {
        font-size: 0.48rem;
        letter-spacing: 0.1rem;
        margin-right: 0.35rem;
      }

      .sep {
        margin: 0 0.5rem;
      }

      body.huge .row-0 .headline {
        font-size: clamp(1.45rem, 9vw, 2.35rem);
        letter-spacing: -0.025em;
      }

      body.huge .row-1 .headline {
        font-size: clamp(1.15rem, 7vw, 1.75rem);
      }

      body.huge .row-2 .headline {
        font-size: clamp(0.95rem, 5.8vw, 1.4rem);
        letter-spacing: 0.01em;
      }

      body.huge .row-3 .headline {
        font-size: clamp(1.25rem, 8vw, 2rem);
      }

      body.huge .sep {
        font-size: 1.2rem;
        margin: 0 0.7rem;
      }

      #feed-status {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        grid-template-areas:
          "prime prime"
          "clock pills";
        align-items: end;
        padding: 0.28rem 0.65rem 0.42rem;
        column-gap: 0.45rem;
        row-gap: 0.2rem;
        min-height: 0;
      }

      #feed-status nav {
        display: none;
      }

      #clock {
        grid-area: clock;
        position: static;
        max-width: 46vw;
        overflow: hidden;
        text-overflow: clip;
      }

      #feed-pills {
        grid-area: pills;
        justify-self: end;
        margin-left: 0;
        gap: 0.38rem;
        max-width: 52vw;
        overflow: hidden;
      }
    }

    @media (max-width: 430px) {
      .header pre {
        font-size: 0.32rem;
        line-height: 0.76;
      }

      .control-button,
      .toggle-label {
        font-size: 0.58rem;
      }

      #feed-pills {
        max-width: 58vw;
      }
    }
  </style>
</head>

<body>
  <div class="header">
    <h1>Mike Borsare</h1>
    <div class="header-row">
      <pre>
   _   _  ____    __    ____  __    ____  _  _  ____  ___ 
  ( )_( )( ___)  /__\  (  _ \(  )  (_  _)( \( )( ___)/ __)
   ) _ (  )__)  /(__)\  )(_) ))(__  _)(_  )  (  )__) \__ \
  (_) (_)(____)(__)(__)(____/(____)(____)(_)\_)(____)(___/
        </pre>
      <div class="header-controls">
        <button class="control-button" id="shakeButton" type="button">Randomize [z]</button>
        <label class="toggle-label">
          <input type="checkbox" id="hugeToggle" /> huge </label>
        <label class="toggle-label" style="position:relative;">
          <input type="checkbox" id="colorToggle" /> color
          <input type="color" id="colorSwatch" value="#00ff88" title="pick a hue" />
        </label>
      </div>
    </div>
  </div>

  <div id="status">fetching feeds…</div>
  <div id="stage"></div>
  <div id="feed-status">
    <nav><a href="/">PRIME Media Department</a></nav>
    <time id="clock"></time>
    <div id="feed-pills"></div>
  </div>

  <script>
    // ── SCROLL STATE ──
    let allStates = []
    let currentItems = []

    // ── HUGE MODE ──
    const hugeToggle = document.getElementById('hugeToggle')
    if (hugeToggle) {
      hugeToggle.checked = localStorage.getItem('paper:huge') === '1'
      document.body.classList.toggle('huge', hugeToggle.checked)
      hugeToggle.addEventListener('change', () => {
        document.body.classList.toggle('huge', hugeToggle.checked)
        localStorage.setItem('paper:huge', hugeToggle.checked ? '1' : '0')
        requestAnimationFrame(() => {
          for (const s of allStates) {
            const newHalf = s.el.scrollWidth / 2
            if (s.halfWidth > 0 && newHalf > 0) s.offset = s.offset * (newHalf / s.halfWidth)
            s.halfWidth = newHalf || 1
          }
        })
      })
    }

    // ── COLOR MODE ──
    const colorToggle = document.getElementById('colorToggle')
    const colorSwatch = document.getElementById('colorSwatch')
    const root = document.documentElement

    const DEFAULT_PALETTE = {
      bg: '#000000', text: '#c0c0c0', stamp: '#888888', seal: '#eaffea', dim: '#1a1a1a',
    }

    function hexToHsl(hex) {
      let r = parseInt(hex.slice(1, 3), 16) / 255
      let g = parseInt(hex.slice(3, 5), 16) / 255
      let b = parseInt(hex.slice(5, 7), 16) / 255
      const max = Math.max(r, g, b), min = Math.min(r, g, b)
      let h, s, l = (max + min) / 2
      if (max === min) {h = s = 0} else {
        const d = max - min
        s = l > 0.5 ? d / (2 - max - min) : d / (max + min)
        switch (max) {
          case r: h = ((g - b) / d + (g < b ? 6 : 0)) / 6; break
          case g: h = ((b - r) / d + 2) / 6; break
          case b: h = ((r - g) / d + 4) / 6; break
        }
      }
      return {h: Math.round(h * 360), s: Math.round(s * 100), l: Math.round(l * 100)}
    }

    function hsl(h, s, l) {return `hsl(${h},${s}%,${l}%)`}

    function paletteFromHex(hex) {
      const {h} = hexToHsl(hex)
      return {
        bg: hsl(h, 18, 3),
        text: hsl(h, 22, 72),
        stamp: hsl(h, 20, 48),
        seal: hsl(h, 55, 88),
        dim: hsl(h, 14, 9),
      }
    }

    function applyPalette(p) {
      root.style.setProperty('--bg', p.bg)
      root.style.setProperty('--text', p.text)
      root.style.setProperty('--stamp', p.stamp)
      root.style.setProperty('--seal', p.seal)
      root.style.setProperty('--dim', p.dim)
      updateRow1Color(p)
    }

    function updateRow1Color(p) {
      let sheet = document.getElementById('dynamic-row1')
      if (!sheet) {sheet = document.createElement('style'); sheet.id = 'dynamic-row1'; document.head.appendChild(sheet)}
      const hMatch = p.seal.match(/hsl\((\d+)/)
      const hue = hMatch ? parseInt(hMatch[1]) : 120
      sheet.textContent = `.row-1 .headline { color: hsl(${hue},28%,64%) !important; }`
    }

    function clearRow1Override() {
      const sheet = document.getElementById('dynamic-row1')
      if (sheet) sheet.textContent = ''
    }

    function applyDefault() {
      for (const [k, v] of Object.entries(DEFAULT_PALETTE)) root.style.setProperty(`--${k}`, v)
      clearRow1Override()
    }

    const savedColor = localStorage.getItem('paper:color')
    const savedColorOn = localStorage.getItem('paper:colorOn') === '1'
    if (savedColor) colorSwatch.value = savedColor
    colorToggle.checked = savedColorOn
    if (savedColorOn && savedColor) applyPalette(paletteFromHex(savedColor))

    colorToggle.addEventListener('change', () => {
      const on = colorToggle.checked
      localStorage.setItem('paper:colorOn', on ? '1' : '0')
      on ? applyPalette(paletteFromHex(colorSwatch.value)) : applyDefault()
    })

    colorSwatch.addEventListener('input', () => {
      localStorage.setItem('paper:color', colorSwatch.value)
      if (colorToggle.checked) applyPalette(paletteFromHex(colorSwatch.value))
    })

      // ── CLOCK ──
      ; (() => {
        const clock = document.getElementById('clock')
        let t = 0
        const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat']
        const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec']

        function updateClock() {
          const now = new Date()
          clock.textContent =
            `${days[now.getDay()]} ${months[now.getMonth()]} ${now.getDate()} ` +
            `${String(now.getHours()).padStart(2, '0')}:` +
            `${String(now.getMinutes()).padStart(2, '0')}:` +
            `${String(now.getSeconds()).padStart(2, '0')}:` +
            `${String(now.getMilliseconds()).padStart(3, '0')}`
        }

        function pulse() {
          t += 0.02
          clock.style.opacity = 0.35 + (Math.sin(t) + 1) * 0.15
          requestAnimationFrame(pulse)
        }

        updateClock()
        setInterval(updateClock, 50)
        pulse()
      })()

    // ── FEEDS ──
    // Add / remove entries here freely.
    // label  : short caps badge shown on each headline
    // rss    : direct RSS/Atom URL (passed through rss2json)
    const SOURCES = [
      {label: 'NYT', rss: 'https://rss.nytimes.com/services/xml/rss/nyt/HomePage.xml'},
      {label: 'WAPO', rss: 'https://feeds.washingtonpost.com/rss/homepage'},
      {label: 'BBC', rss: 'https://feeds.bbci.co.uk/news/rss.xml'},
      {label: 'AP', rss: 'https://feeds.apnews.com/rss/apf-topnews'},
      {label: 'RTR', rss: 'https://feeds.reuters.com/reuters/topNews'},
      {label: 'GRDN', rss: 'https://www.theguardian.com/world/rss'},
    ]

    const RSS2JSON = 'https://api.rss2json.com/v1/api.json?rss_url='
    const LIMIT = 20
    const CACHE_TTL = 1000 * 60 * 30
    const REFRESH_MS = 1000 * 60 * 10

    const ROW_CONFIGS = [
      {speed: 55, dir: 'rtl'},
      {speed: 38, dir: 'ltr'},
      {speed: 70, dir: 'rtl'},
      {speed: 45, dir: 'ltr'},
      {speed: 60, dir: 'rtl'},
      {speed: 42, dir: 'ltr'},
      {speed: 50, dir: 'rtl'},
      {speed: 35, dir: 'ltr'},
    ]

    // ── FEED STATUS BAR ──
    const feedPillsEl = document.getElementById('feed-pills')
    const feedPills = {}

    function initPills() {
      feedPillsEl.innerHTML = ''
      for (const src of SOURCES) {
        const pill = document.createElement('span')
        pill.className = 'feed-pill loading'
        pill.textContent = src.label
        pill.title = src.rss
        feedPillsEl.appendChild(pill)
        feedPills[src.label] = pill
      }
    }

    function setPillState(label, state) {  // state: 'loading' | 'ok' | 'err'
      const pill = feedPills[label]
      if (!pill) return
      pill.className = `feed-pill ${state}`
    }

    // ── CACHE ──
    function getCache(key) {
      try {
        const raw = localStorage.getItem(key)
        if (!raw) return null
        const parsed = JSON.parse(raw)
        if (Date.now() - parsed.time > CACHE_TTL) {localStorage.removeItem(key); return null}
        return parsed.data
      } catch {return null}
    }

    function setCache(key, data) {
      try {localStorage.setItem(key, JSON.stringify({time: Date.now(), data}))} catch { }
    }

    async function fetchSource(source) {
      const key = 'feed:' + source.label
      let items = getCache(key)

      if (!items) {
        const res = await fetch(RSS2JSON + encodeURIComponent(source.rss))
        const data = await res.json()
        if (data.status !== 'ok') throw new Error(data.message || 'feed error')
        items = (data.items || [])
          .slice(0, LIMIT)
          .filter((v, i, a) => a.findIndex(x => x.link === v.link) === i)
        setCache(key, items)
      }

      return items.map(item => ({
        title: item.title,
        link: 'https://archive.ph/newest/' + encodeURIComponent(item.link.replace(/\?.*/, '')),
        label: source.label,
      }))
    }

    // Fetch each source independently so one failure doesn't block the rest
    async function fetchAll() {
      initPills()
      const settled = await Promise.allSettled(
        SOURCES.map(async src => {
          const items = await fetchSource(src)
          setPillState(src.label, 'ok')
          return items
        })
      )

      const good = [], failed = []
      settled.forEach((r, i) => {
        if (r.status === 'fulfilled') {good.push(...r.value)}
        else {
          setPillState(SOURCES[i].label, 'err')
          failed.push(SOURCES[i].label)
          console.warn(`[paper] ${SOURCES[i].label} failed:`, r.reason?.message)
        }
      })

      return {items: good, failed}
    }

    // ── DOM HELPERS ──
    function makeItems(items) {
      const frag = document.createDocumentFragment()
      items.forEach(item => {
        const a = document.createElement('a')
        a.className = 'marquee-item'
        a.href = item.link
        a.target = '_blank'
        a.rel = 'noopener'

        const badge = document.createElement('span')
        badge.className = 'src-badge'
        badge.textContent = item.label

        const hl = document.createElement('span')
        hl.className = 'headline'
        hl.textContent = item.title

        const sep = document.createElement('span')
        sep.className = 'sep'
        sep.textContent = '◆'

        a.appendChild(badge)
        a.appendChild(hl)
        a.appendChild(sep)
        frag.appendChild(a)
      })
      return frag
    }

    function normalise(offset, halfWidth) {
      if (halfWidth <= 0) return 0
      let o = offset % halfWidth
      if (o > 0) o -= halfWidth
      if (o <= -halfWidth) o += halfWidth
      return o
    }

    function attachDrag(s, hitArea) {
      let pointerId = null, down = false, moved = false

      hitArea.addEventListener('pointerdown', e => {
        if (e.button !== 0) return
        down = true; moved = false; pointerId = e.pointerId
        s.dragging = false; s.dragStartX = e.clientX
        s.dragStartOffset = s.offset; s.dragDelta = 0
      })

      hitArea.addEventListener('pointermove', e => {
        if (!down || e.pointerId !== pointerId) return
        s.dragDelta = e.clientX - s.dragStartX
        if (!moved && Math.abs(s.dragDelta) > 4) {
          moved = true; s.dragging = true
          hitArea.setPointerCapture(e.pointerId)
          hitArea.classList.add('dragging')
        }
        if (!moved) return
        s.offset = s.dragStartOffset + s.dragDelta
      })

      function endDrag(e) {
        if (!down || e.pointerId !== pointerId) return
        down = false
        if (s.dragging) {
          s.dragging = false
          hitArea.classList.remove('dragging')
          s.offset = normalise(s.offset, s.halfWidth)
          hitArea.classList.add('drag-end')
          setTimeout(() => hitArea.classList.remove('drag-end'), 150)
        }
        pointerId = null
      }

      hitArea.addEventListener('pointerup', endDrag)
      hitArea.addEventListener('pointercancel', endDrag)
      hitArea.addEventListener('click', e => {
        if (Math.abs(s.dragDelta) > 4) {e.preventDefault(); e.stopPropagation()}
      }, true)
    }

    let rafStarted = false
    function startRaf() {
      if (rafStarted) return
      rafStarted = true
      let last = null
      function frame(ts) {
        if (last === null) last = ts
        const dt = Math.min((ts - last) / 1000, 0.05)
        last = ts
        for (const s of allStates) {
          if (!s.dragging) {
            s.offset += s.pps * dt
            s.offset = normalise(s.offset, s.halfWidth)
          }
          s.el.style.transform = `translateX(${s.offset}px)`
        }
        requestAnimationFrame(frame)
      }
      requestAnimationFrame(frame)
    }

    function shuffleItems(arr) {
      const out = [...arr]
      for (let i = out.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1))
          ;[out[i], out[j]] = [out[j], out[i]]
      }
      return out
    }

    function buildRow(items, rowIndex) {
      const cfg = ROW_CONFIGS[rowIndex % ROW_CONFIGS.length]
      const el = document.createElement('div')
      el.className = `marquee-row row-${rowIndex % 4}`
      el.appendChild(makeItems(items))
      el.appendChild(makeItems(items))

      const s = {
        el, halfWidth: 1,
        pps: cfg.dir === 'rtl' ? -cfg.speed : cfg.speed,
        dir: cfg.dir, offset: 0,
        dragging: false, dragStartX: 0, dragStartOffset: 0, dragDelta: 0,
      }
      allStates.push(s)
      return s
    }

    function buildStage(allItems) {
      const stage = document.getElementById('stage')
      const statusEl = document.getElementById('status')
      stage.innerHTML = ''
      statusEl.classList.add('hidden')
      allStates = []

      const shuffle = shuffleItems

      // Per-source pools for dedicated rows (falls back to allItems if thin)
      const byLabel = {}
      for (const src of SOURCES) byLabel[src.label] = allItems.filter(i => i.label === src.label)
      const nyt = byLabel['NYT'] || []
      const wapo = byLabel['WAPO'] || []
      const intl = [...(byLabel['BBC'] || []), ...(byLabel['RTR'] || []), ...(byLabel['GRDN'] || [])]
      const wire = byLabel['AP'] || []

      const rowSets = [
        allItems,                                     // 0 — everything
        nyt.length ? nyt : allItems,               // 1 — NYT
        shuffle(allItems),                            // 2 — shuffle
        wapo.length ? wapo : allItems,               // 3 — WAPO
        intl.length ? shuffle(intl) : shuffle(allItems), // 4 — intl (BBC/RTR/GRDN)
        wire.length ? wire : shuffle(allItems),      // 5 — wire (AP)
        nyt.length ? shuffle(nyt) : shuffle(allItems), // 6 — NYT again shuffled
        shuffle(allItems),                            // 7 — full shuffle
      ]

      rowSets.forEach((items, i) => {
        if (!items.length) return
        const wrapper = document.createElement('div')
        wrapper.className = 'marquee-stage'
        const s = buildRow(items, i)
        wrapper.appendChild(s.el)
        attachDrag(s, wrapper)
        stage.appendChild(wrapper)
      })

      requestAnimationFrame(() =>
        requestAnimationFrame(() => {
          for (const s of allStates) {
            s.halfWidth = s.el.scrollWidth / 2 || 1
            s.offset = s.dir === 'ltr' ? -s.halfWidth : 0
          }
        })
      )

      startRaf()
    }

    function updateAnchor(anchor, item) {
      if (!anchor || !item) return
      anchor.href = item.link
      const badge = anchor.querySelector('.src-badge')
      const headline = anchor.querySelector('.headline')
      if (badge) badge.textContent = item.label
      if (headline) headline.textContent = item.title
    }

    function shake() {
      if (!currentItems.length) return

      const stage = document.getElementById('stage')
      stage.classList.remove('answer-cut-settle')
      stage.classList.add('answer-cut')

      requestAnimationFrame(() => {
        document.querySelectorAll('.marquee-row').forEach(row => {
          const anchors = [...row.querySelectorAll('.marquee-item')]
          const half = Math.floor(anchors.length / 2)
          if (!half) return

          const next = shuffleItems(currentItems).slice(0, half)
          for (let i = 0; i < half; i++) {
            const item = next[i % next.length]
            updateAnchor(anchors[i], item)
            updateAnchor(anchors[i + half], item)
          }
        })

        requestAnimationFrame(() => {
          stage.classList.remove('answer-cut')
          stage.classList.add('answer-cut-settle')
        })
      })
    }

    const shakeButton = document.getElementById('shakeButton')
    if (shakeButton) shakeButton.addEventListener('click', shake)

    document.addEventListener('keydown', e => {
      const tag = e.target?.tagName?.toLowerCase()
      if (tag === 'input' || tag === 'textarea' || e.target?.isContentEditable) return
      if (e.key.toLowerCase() !== 'z' || e.metaKey || e.ctrlKey || e.altKey) return
      e.preventDefault()
      shake()
    })

    async function load() {
      const statusEl = document.getElementById('status')
      statusEl.classList.remove('hidden', 'err')
      statusEl.textContent = 'fetching feeds…'

      const {items, failed} = await fetchAll()

      if (!items.length) {
        statusEl.textContent = 'no items'
        return
      }

      currentItems = items
      buildStage(items)

      if (failed.length) {
        // Stage is live; surface feed errors only in the pill bar (already set)
        console.info(`[paper] loaded ${items.length} items; failed: ${failed.join(', ')}`)
      }
    }

    load()
    setInterval(load, REFRESH_MS)
  </script>
</body>

</html>
