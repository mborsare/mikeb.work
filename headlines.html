<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <title>mikeb.work/headlines</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    :root {
      --bg: #000000;
      --text: #c0c0c0;
      --stamp: #888888;
      --seal: #eaffea;
      --dim: #1a1a1a;
      --row-pad: 0px;
      --row-gap: 0px;
      --row-leading: 0.78;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
    }

    @font-face {
      font-family: 'ComicMono';
      src: url('/fonts/ComicMono-Regular.woff') format('woff');
      font-display: swap;
      font-style: normal;
      font-weight: 400;
    }

    body {
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      font-family: 'ComicMono', monospace;
    }

    a {
      color: inherit;
    }

    .header {
      flex-shrink: 0;
      padding: 0.45rem 0.65rem;
      text-align: center;
      border-bottom: 1px solid #1a1a1a;
    }

    h1 {
      display: none;
    }

    .header-row {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      margin-top: 0;
    }

    .header pre {
      max-width: 100%;
      margin: 0;
      overflow: hidden;
      font-size: 0.4rem;
      line-height: 0.9;
      white-space: pre;
    }

    .neon {
      color: var(--seal);
      text-shadow:
        0 0 4px currentColor,
        0 0 14px currentColor;
    }

    .header-controls {
      width: 100%;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      column-gap: 1rem;
      row-gap: 0.45rem;
    }

    .control-button,
    .toggle-label,
    .speed-control {
      color: var(--stamp);
      font-size: 0.62rem;
      line-height: 1;
      letter-spacing: 0.035rem;
      user-select: none;
      white-space: nowrap;
    }

    .control-button {
      appearance: none;
      -webkit-appearance: none;
      padding: 0;
      border: 0;
      background: transparent;
      cursor: pointer;
      font: inherit;
    }

    .control-button:hover,
    .toggle-label:hover,
    .speed-control:hover {
      color: var(--seal);
    }

    .toggle-label,
    .speed-control {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
    }

    .speed-control {
      flex-basis: 100%;
      justify-content: center;
    }

    .toggle-label {
      cursor: pointer;
      gap: 0.25rem;
    }

    .toggle-label input[type='checkbox'] {
      appearance: none;
      -webkit-appearance: none;
      position: relative;
      top: 0;
      flex-shrink: 0;
      width: 0.72rem;
      height: 0.72rem;
      border: 1px solid var(--stamp);
      background: transparent;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    .toggle-label input[type='checkbox']:checked {
      background: var(--seal);
      border-color: var(--seal);
    }

    .toggle-label input[type='checkbox']:checked::after {
      content: '';
      position: absolute;
      inset: 1px;
      display: block;
      background: var(--bg);
      clip-path: polygon(14% 44%, 0 65%, 50% 100%, 100% 16%, 80% 0%, 43% 62%);
    }

    #speedSlider,
    #rowPadSlider {
      appearance: none;
      -webkit-appearance: none;
      width: min(52vw, 10rem);
      height: 1rem;
      background: transparent;
      accent-color: var(--seal);
      cursor: pointer;
    }

    #speedSlider::-webkit-slider-runnable-track,
    #rowPadSlider::-webkit-slider-runnable-track {
      height: 1px;
      background: var(--stamp);
      opacity: 0.65;
    }

    #speedSlider::-webkit-slider-thumb,
    #rowPadSlider::-webkit-slider-thumb {
      appearance: none;
      -webkit-appearance: none;
      width: 0.75rem;
      height: 0.75rem;
      margin-top: -0.35rem;
      border: 1px solid var(--seal);
      border-radius: 999px;
      background: var(--bg);
      box-shadow: 0 0 8px currentColor;
    }

    #speedSlider::-moz-range-track,
    #rowPadSlider::-moz-range-track {
      height: 1px;
      background: var(--stamp);
      opacity: 0.65;
    }

    #speedSlider::-moz-range-thumb,
    #rowPadSlider::-moz-range-thumb {
      width: 0.75rem;
      height: 0.75rem;
      border: 1px solid var(--seal);
      border-radius: 999px;
      background: var(--bg);
      box-shadow: 0 0 8px currentColor;
    }

    #speedValue,
    #rowPadValue {
      min-width: 4ch;
      text-align: right;
      opacity: 0.65;
    }

    #colorSwatch {
      appearance: none;
      -webkit-appearance: none;
      position: relative;
      top: 0;
      display: none;
      flex-shrink: 0;
      width: 1.45rem;
      height: 1.45rem;
      padding: 0;
      overflow: hidden;
      border: 1px solid var(--stamp);
      border-radius: 0.3rem;
      background: transparent;
      cursor: pointer;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    #colorSwatch::-webkit-color-swatch-wrapper {
      padding: 0;
    }

    #colorSwatch::-webkit-color-swatch,
    #colorSwatch::-moz-color-swatch {
      border: 0;
    }

    #colorSwatch:hover {
      border-color: var(--seal);
      box-shadow: 0 0 0 1px var(--seal);
    }

    #colorToggle:checked~#colorSwatch {
      display: inline-block;
    }

    #status {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--stamp);
      font-size: 0.75rem;
      letter-spacing: 0.1rem;
      opacity: 0.6;
    }

    #status.err {
      color: #ff6b6b;
      opacity: 1;
    }

    #status.hidden {
      display: none;
    }

    #stage {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      gap: var(--row-gap);
      min-height: 0;
      overflow: hidden;
    }

    #stage.answer-cut {
      opacity: 0.12;
      filter: blur(2px);
    }

    #stage.answer-cut-settle {
      opacity: 1;
      filter: blur(0);
      transition: opacity 180ms ease-out, filter 180ms ease-out;
    }

    .marquee-stage {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      min-height: 0;
      padding-block: var(--row-pad);
      overflow: hidden;
      border-bottom: 1px solid #111111;
      cursor: grab;
      touch-action: pan-y;
    }

    .marquee-stage.dragging {
      cursor: grabbing;
    }

    .touchish .marquee-stage {
      cursor: default;
    }

    .marquee-row {
      display: inline-flex;
      align-items: center;
      min-height: 0;
      white-space: nowrap;
      line-height: var(--row-leading);
      user-select: none;
      will-change: transform;
    }

    .marquee-item {
      display: inline-flex;
      align-items: center;
      min-height: 0;
      padding: 0 0.25rem;
      line-height: var(--row-leading);
      text-decoration: none;
    }

    .headline,
    .src-badge,
    .sep {
      display: inline-flex;
      align-items: center;
      min-height: 0;
      line-height: var(--row-leading);
    }

    .marquee-stage.dragging .marquee-item,
    .marquee-stage.drag-end .marquee-item {
      pointer-events: none;
    }

    .marquee-item:hover .headline {
      color: #ffffff;
    }

    .marquee-item:hover .sep {
      color: var(--seal);
    }

    .row-0 .headline {
      color: var(--seal);
      font-size: 0.95rem;
    }

    .row-1 .headline {
      color: #b0c8b0;
      font-size: 0.78rem;
    }

    .row-2 .headline {
      color: var(--stamp);
      font-size: 0.68rem;
      letter-spacing: 0.035rem;
    }

    .row-3 .headline {
      color: var(--seal);
      font-size: 0.85rem;
      opacity: 0.7;
    }

    .src-badge {
      flex-shrink: 0;
      margin-right: 0.35rem;
      color: var(--stamp);
      font-size: 0.48rem;
      letter-spacing: 0.1rem;
      text-transform: uppercase;
      opacity: 0.6;
    }

    .sep {
      margin: 0 0.5rem;
      color: #2a2a2a;
      user-select: none;
    }

    body.huge .row-0 .headline {
      font-size: clamp(1.45rem, 9vw, 2.35rem);
      letter-spacing: -0.025em;
    }

    body.huge .row-1 .headline {
      font-size: clamp(1.15rem, 7vw, 1.75rem);
    }

    body.huge .row-2 .headline {
      font-size: clamp(0.95rem, 5.8vw, 1.4rem);
      letter-spacing: 0.01em;
    }

    body.huge .row-3 .headline {
      font-size: clamp(1.25rem, 8vw, 2rem);
    }

    body.huge .src-badge {
      display: none;
    }

    body.huge .sep {
      margin: 0 0.7rem;
      font-size: 1.2rem;
    }

    #feed-status {
      flex-shrink: 0;
      min-height: 0;
      padding: 0.42rem 0.65rem;
      overflow: hidden;
      border-top: 1px solid #111111;
    }

    .footer-marquee {
      width: 100%;
      min-width: 0;
      overflow: hidden;
    }

    .footer-track {
      width: 100%;
      min-width: 0;
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      align-items: center;
      column-gap: 0.45rem;
      will-change: auto;
    }

    #feed-status nav {
      min-width: 0;
      justify-self: start;
      white-space: nowrap;
    }

    #feed-status nav a {
      color: var(--stamp);
      font-size: 0.48rem;
      letter-spacing: 0.075rem;
      text-decoration: none;
    }

    #feed-status nav a:hover {
      color: var(--seal);
    }

    #clock {
      justify-self: end;
      max-width: 46vw;
      min-width: max-content;
      overflow: hidden;
      color: var(--seal);
      font-size: 0.48rem;
      letter-spacing: 0.075rem;
      text-overflow: clip;
      white-space: nowrap;
      opacity: 0.45;
      filter: blur(0.25px);
    }

    #feed-pills {
      justify-self: end;
      max-width: 52vw;
      min-width: 0;
      display: flex;
      gap: 0.38rem;
      justify-content: flex-end;
      overflow: hidden;
    }

    #feed-status.footer-overflow .footer-marquee {
      pointer-events: auto;
    }

    #feed-status.footer-overflow .footer-track {
      width: max-content;
      min-width: max-content;
      display: inline-flex;
      gap: 1.2rem;
      animation: footer-marquee var(--footer-marquee-duration, 18s) linear infinite;
      will-change: transform;
    }

    #feed-status.footer-overflow:hover .footer-track {
      animation-play-state: paused;
    }

    #feed-status.footer-overflow #clock,
    #feed-status.footer-overflow #feed-pills {
      max-width: none;
      overflow: visible;
    }

    #feed-status.footer-overflow #feed-pills {
      flex-shrink: 0;
    }

    @keyframes footer-marquee {
      from {
        transform: translateX(100%);
      }

      to {
        transform: translateX(-100%);
      }
    }

    .feed-pill {
      color: var(--stamp);
      font-size: 0.48rem;
      letter-spacing: 0.075rem;
      text-transform: uppercase;
      opacity: 0.4;
      transition: color 0.3s, opacity 0.3s;
    }

    .feed-pill.ok {
      color: var(--seal);
      opacity: 0.55;
    }

    .feed-pill.err {
      opacity: 0.2;
    }

    .feed-pill.loading {
      color: var(--stamp);
      opacity: 0.3;
    }

    @media (prefers-reduced-motion: reduce) {

      .footer-track,
      .marquee-row,
      .header pre {
        animation: none !important;
      }
    }

    @media (min-width: 701px) {
      body {
        min-height: 0;
      }

      .header {
        padding: clamp(0.4rem, 1.5vw, 0.9rem) clamp(0.75rem, 2vw, 1.25rem);
      }

      .header-row {
        flex-direction: row;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        margin-top: 0.3rem;
      }

      .header pre {
        font-size: 1rem;
        line-height: normal;
      }

      .header-controls {
        width: auto;
        display: inline-flex;
        flex-wrap: nowrap;
        gap: 0.5rem;
      }

      .control-button,
      .toggle-label,
      .speed-control {
        font-size: 0.75rem;
        line-height: normal;
        letter-spacing: 0.05rem;
      }

      .speed-control {
        flex-basis: auto;
        justify-content: flex-start;
        gap: 0.45rem;
      }

      .toggle-label {
        gap: 0.35rem;
      }

      .toggle-label input[type='checkbox'] {
        top: 0.05rem;
        width: 0.65rem;
        height: 0.65rem;
      }

      #speedSlider,
      #rowPadSlider {
        width: clamp(5.5rem, 12vw, 9rem);
      }

      #colorSwatch {
        top: 0.1rem;
        width: 2rem;
        height: 2rem;
        border-radius: 0.4rem;
      }

      .marquee-item {
        padding: 0 0.4rem;
      }

      .row-0 .headline {
        font-size: 1.05rem;
      }

      .row-1 .headline {
        font-size: 0.85rem;
      }

      .row-2 .headline {
        font-size: 0.75rem;
        letter-spacing: 0.05rem;
      }

      .row-3 .headline {
        font-size: 0.95rem;
      }

      .src-badge {
        margin-right: 0.45rem;
        font-size: 0.55rem;
        letter-spacing: 0.15rem;
      }

      .sep {
        margin: 0 0.75rem;
      }

      body.huge .row-0 .headline {
        font-size: 4.5rem;
        letter-spacing: -0.02em;
      }

      body.huge .row-1 .headline {
        font-size: 3.2rem;
        letter-spacing: -0.01em;
      }

      body.huge .row-2 .headline {
        font-size: 2.4rem;
        letter-spacing: 0.02em;
      }

      body.huge .row-3 .headline {
        font-size: 3.8rem;
        letter-spacing: -0.015em;
      }

      body.huge .sep {
        margin: 0 1.2rem;
        font-size: 2rem;
      }

      #feed-status {
        padding: 1rem clamp(0.75rem, 2vw, 1.25rem);
      }

      .footer-track {
        column-gap: 0.55rem;
      }

      #feed-status nav a,
      #clock,
      .feed-pill {
        font-size: 0.75rem;
        letter-spacing: 0.12rem;
      }

      #clock,
      #feed-pills {
        max-width: none;
        overflow: visible;
      }

      #feed-pills {
        gap: 0.6rem;
      }
    }

    @media (max-width: 430px) {
      .header pre {
        font-size: 0.32rem;
        line-height: 0.76;
      }

      .control-button,
      .toggle-label {
        font-size: 0.58rem;
      }

      #feed-pills {
        max-width: 58vw;
      }
    }
  </style>
</head>

<body>
  <div class="header">
    <h1>Mike Borsare</h1>
    <div class="header-row">
      <pre class="neon">
   _   _  ____    __    ____  __    ____  _  _  ____  ___ 
  ( )_( )( ___)  /__\  (  _ \(  )  (_  _)( \( )( ___)/ __)
   ) _ (  )__)  /(__)\  )(_) ))(__  _)(_  )  (  )__) \__ \
  (_) (_)(____)(__)(__)(____/(____)(____)(_)\_)(____)(___/
      </pre>
      <div class="header-controls">
        <button class="control-button" id="shakeButton" type="button">Randomize [z]</button>
        <label class="speed-control">
          speed
          <input type="range" id="speedSlider" min="0" max="200" step="5" value="100" />
          <span id="speedValue">100%</span>
        </label>
        <label class="speed-control">
          pad
          <input type="range" id="rowPadSlider" min="0" max="24" step="1" value="0" />
          <span id="rowPadValue">0px</span>
        </label>
        <label class="toggle-label">
          <input type="checkbox" id="hugeToggle" /> huge
        </label>
        <label class="toggle-label" style="position: relative;">
          <input type="checkbox" id="colorToggle" /> color
          <input type="color" id="colorSwatch" value="#00ff88" title="pick a hue" />
        </label>
      </div>
    </div>
  </div>

  <div id="status">fetching feeds…</div>
  <div id="stage"></div>
  <div id="feed-status">
    <div class="footer-marquee" id="footerMarquee">
      <div class="footer-track" id="footerTrack">
        <nav><a href="/">PRIME Media Department</a></nav>
        <time class="neon" id="clock"></time>
        <div id="feed-pills"></div>
      </div>
    </div>
  </div>

  <script>
    let allStates = []
    let currentItems = []
    let speedMultiplier = 1
    let stageRebuildTimer = 0
    let syncClockSpeed = () => { }

    const coarsePointerQuery = window.matchMedia?.('(hover: none), (pointer: coarse)')

    function updateTouchClass() {
      document.documentElement.classList.toggle('touchish', Boolean(coarsePointerQuery?.matches))
    }

    updateTouchClass()
    coarsePointerQuery?.addEventListener?.('change', updateTouchClass)

    const feedStatusEl = document.getElementById('feed-status')
    const footerTrackEl = document.getElementById('footerTrack')
    let footerCheckQueued = false

    function queueFooterMarqueeCheck() {
      if (footerCheckQueued) return
      footerCheckQueued = true
      requestAnimationFrame(() => {
        footerCheckQueued = false
        updateFooterMarquee()
      })
    }

    function updateFooterMarquee() {
      if (!feedStatusEl || !footerTrackEl) return

      feedStatusEl.classList.remove('footer-overflow')
      footerTrackEl.style.removeProperty('--footer-marquee-duration')

      const styles = getComputedStyle(feedStatusEl)
      const available = feedStatusEl.clientWidth - parseFloat(styles.paddingLeft) - parseFloat(styles.paddingRight)
      const trackStyles = getComputedStyle(footerTrackEl)
      const gap = parseFloat(trackStyles.columnGap || trackStyles.gap) || 0
      const kids = [...footerTrackEl.children].filter(el => getComputedStyle(el).display !== 'none')
      const needed = kids.reduce((sum, el) => sum + el.scrollWidth, 0) + gap * Math.max(0, kids.length - 1)
      const shouldMarquee = needed > available

      feedStatusEl.classList.toggle('footer-overflow', shouldMarquee)

      if (shouldMarquee) {
        const distance = needed + available
        const seconds = Math.max(14, Math.min(34, distance / 42))
        footerTrackEl.style.setProperty('--footer-marquee-duration', `${seconds}s`)
      }
    }

    if (feedStatusEl && footerTrackEl) {
      const footerObserver = new ResizeObserver(queueFooterMarqueeCheck)
      footerObserver.observe(feedStatusEl)
      footerObserver.observe(footerTrackEl)
      window.addEventListener('load', queueFooterMarqueeCheck)
      window.addEventListener('resize', queueFooterMarqueeCheck)
    }

    const speedSlider = document.getElementById('speedSlider')
    const speedValue = document.getElementById('speedValue')

    function updateSpeedValue() {
      if (!speedSlider || !speedValue) return
      speedValue.textContent = `${speedSlider.value}%`
    }

    function applySpeed() {
      if (!speedSlider) return
      speedMultiplier = Number(speedSlider.value || 100) / 100

      for (const s of allStates) {
        if (typeof s.basePps === 'number') s.pps = s.basePps * speedMultiplier
      }

      syncClockSpeed()
      if (allStates.length && speedMultiplier > 0) startRaf()
    }

    if (speedSlider) {
      const savedSpeed = localStorage.getItem('paper:speed')
      if (savedSpeed !== null) speedSlider.value = savedSpeed
      updateSpeedValue()
      applySpeed()

      speedSlider.addEventListener('input', () => {
        localStorage.setItem('paper:speed', speedSlider.value)
        updateSpeedValue()
        applySpeed()
      })
    }

    const rowPadSlider = document.getElementById('rowPadSlider')
    const rowPadValue = document.getElementById('rowPadValue')

    function updateRowPadValue() {
      if (!rowPadSlider || !rowPadValue) return
      rowPadValue.textContent = `${rowPadSlider.value}px`
    }

    function applyRowPad() {
      if (!rowPadSlider) return
      const px = Number(rowPadSlider.value || 0)
      document.documentElement.style.setProperty('--row-pad', `${px}px`)
      document.documentElement.style.setProperty('--row-gap', px > 0 ? `${Math.floor(px / 2)}px` : '0px')
    }

    if (rowPadSlider) {
      const savedRowPad = localStorage.getItem('paper:rowPad')
      if (savedRowPad !== null) rowPadSlider.value = savedRowPad
      updateRowPadValue()
      applyRowPad()

      rowPadSlider.addEventListener('input', () => {
        localStorage.setItem('paper:rowPad', rowPadSlider.value)
        updateRowPadValue()
        applyRowPad()
        queueStageRebuild()
      })
    }

    const hugeToggle = document.getElementById('hugeToggle')

    function recalcWidths() {
      requestAnimationFrame(() => {
        for (const s of allStates) {
          const newHalf = s.el.scrollWidth / 2
          if (s.halfWidth > 0 && newHalf > 0) s.offset = s.offset * (newHalf / s.halfWidth)
          s.halfWidth = newHalf || 1
        }
      })
    }

    if (hugeToggle) {
      hugeToggle.checked = localStorage.getItem('paper:huge') === '1'
      document.body.classList.toggle('huge', hugeToggle.checked)

      hugeToggle.addEventListener('change', () => {
        document.body.classList.toggle('huge', hugeToggle.checked)
        localStorage.setItem('paper:huge', hugeToggle.checked ? '1' : '0')
        recalcWidths()
        queueStageRebuild()
      })
    }

    const colorToggle = document.getElementById('colorToggle')
    const colorSwatch = document.getElementById('colorSwatch')
    const root = document.documentElement

    const DEFAULT_PALETTE = {
      bg: '#000000',
      text: '#c0c0c0',
      stamp: '#888888',
      seal: '#eaffea',
      dim: '#1a1a1a',
    }

    function hexToHsl(hex) {
      const r = parseInt(hex.slice(1, 3), 16) / 255
      const g = parseInt(hex.slice(3, 5), 16) / 255
      const b = parseInt(hex.slice(5, 7), 16) / 255
      const max = Math.max(r, g, b)
      const min = Math.min(r, g, b)
      let h = 0
      let s = 0
      const l = (max + min) / 2

      if (max !== min) {
        const d = max - min
        s = l > 0.5 ? d / (2 - max - min) : d / (max + min)

        switch (max) {
          case r:
            h = ((g - b) / d + (g < b ? 6 : 0)) / 6
            break
          case g:
            h = ((b - r) / d + 2) / 6
            break
          default:
            h = ((r - g) / d + 4) / 6
        }
      }

      return {
        h: Math.round(h * 360),
        s: Math.round(s * 100),
        l: Math.round(l * 100),
      }
    }

    function hsl(h, s, l) {
      return `hsl(${h}, ${s}%, ${l}%)`
    }

    function paletteFromHex(hex) {
      const {h} = hexToHsl(hex)

      return {
        bg: hsl(h, 18, 3),
        text: hsl(h, 22, 72),
        stamp: hsl(h, 20, 48),
        seal: hsl(h, 55, 88),
        dim: hsl(h, 14, 9),
      }
    }

    function updateRow1Color(palette) {
      let sheet = document.getElementById('dynamic-row1')
      if (!sheet) {
        sheet = document.createElement('style')
        sheet.id = 'dynamic-row1'
        document.head.appendChild(sheet)
      }

      const hueMatch = palette.seal.match(/hsl\((\d+)/)
      const hue = hueMatch ? parseInt(hueMatch[1], 10) : 120
      sheet.textContent = `.row-1 .headline { color: hsl(${hue}, 28%, 64%) !important; }`
    }

    function clearRow1Override() {
      const sheet = document.getElementById('dynamic-row1')
      if (sheet) sheet.textContent = ''
    }

    function applyPalette(palette) {
      for (const [key, value] of Object.entries(palette)) root.style.setProperty(`--${key}`, value)
      updateRow1Color(palette)
    }

    function applyDefaultPalette() {
      for (const [key, value] of Object.entries(DEFAULT_PALETTE)) root.style.setProperty(`--${key}`, value)
      clearRow1Override()
    }

    const savedColor = localStorage.getItem('paper:color')
    const savedColorOn = localStorage.getItem('paper:colorOn') === '1'

    if (savedColor && colorSwatch) colorSwatch.value = savedColor
    if (colorToggle) colorToggle.checked = savedColorOn
    if (savedColorOn && savedColor) applyPalette(paletteFromHex(savedColor))

    colorToggle?.addEventListener('change', () => {
      const on = colorToggle.checked
      localStorage.setItem('paper:colorOn', on ? '1' : '0')
      on ? applyPalette(paletteFromHex(colorSwatch.value)) : applyDefaultPalette()
    })

    colorSwatch?.addEventListener('input', () => {
      localStorage.setItem('paper:color', colorSwatch.value)
      if (colorToggle?.checked) applyPalette(paletteFromHex(colorSwatch.value))
    })

      ; (() => {
        const clock = document.getElementById('clock')
        const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat']
        const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec']

        function updateClock() {
          if (!clock) return
          const now = new Date()
          clock.textContent =
            `${days[now.getDay()]} ${months[now.getMonth()]} ${now.getDate()} ` +
            `${String(now.getHours()).padStart(2, '0')}:` +
            `${String(now.getMinutes()).padStart(2, '0')}:` +
            `${String(now.getSeconds()).padStart(2, '0')}`
          queueFooterMarqueeCheck()
        }

        syncClockSpeed = () => { }
        updateClock()
        setInterval(updateClock, 1000)
      })()

    const SOURCES = [
      {label: 'NYT', rss: 'https://rss.nytimes.com/services/xml/rss/nyt/HomePage.xml'},
      {label: 'WAPO', rss: 'https://feeds.washingtonpost.com/rss/homepage'},
      {label: 'BBC', rss: 'https://feeds.bbci.co.uk/news/rss.xml'},
      {label: 'AP', rss: 'https://feeds.apnews.com/rss/apf-topnews'},
      {label: 'RTR', rss: 'https://feeds.reuters.com/reuters/topNews'},
      {label: 'GRDN', rss: 'https://www.theguardian.com/world/rss'},
    ]

    const RSS2JSON = 'https://api.rss2json.com/v1/api.json?rss_url='
    const LIMIT = 20
    const CACHE_TTL = 1000 * 60 * 30
    const REFRESH_MS = 1000 * 60 * 10

    const ROW_CONFIGS = [
      {speed: 55, dir: 'rtl'},
      {speed: 38, dir: 'ltr'},
      {speed: 70, dir: 'rtl'},
      {speed: 45, dir: 'ltr'},
    ]

    const MIN_STAGE_ROWS = 8
    const MAX_STAGE_ROWS = 48
    const STAGE_FILL_BUFFER_PX = 32
    const STAGE_REBUILD_DELAY_MS = 80

    const feedPillsEl = document.getElementById('feed-pills')
    const feedPills = {}

    function initPills() {
      if (!feedPillsEl) return
      feedPillsEl.innerHTML = ''

      for (const source of SOURCES) {
        const pill = document.createElement('span')
        pill.className = 'feed-pill loading'
        pill.textContent = source.label
        pill.title = source.rss
        feedPillsEl.appendChild(pill)
        feedPills[source.label] = pill
      }

      queueFooterMarqueeCheck()
    }

    function setPillState(label, state) {
      const pill = feedPills[label]
      if (!pill) return
      pill.className = `feed-pill ${state}`
      queueFooterMarqueeCheck()
    }

    function getCache(key) {
      try {
        const raw = localStorage.getItem(key)
        if (!raw) return null
        const parsed = JSON.parse(raw)

        if (Date.now() - parsed.time > CACHE_TTL) {
          localStorage.removeItem(key)
          return null
        }

        return parsed.data
      } catch (_error) {
        return null
      }
    }

    function setCache(key, data) {
      try {
        localStorage.setItem(key, JSON.stringify({time: Date.now(), data}))
      } catch (_error) { }
    }

    async function fetchSource(source) {
      const key = `feed:${source.label}`
      let items = getCache(key)

      if (!items) {
        const response = await fetch(RSS2JSON + encodeURIComponent(source.rss))
        const data = await response.json()
        if (data.status !== 'ok') throw new Error(data.message || 'feed error')

        items = (data.items || [])
          .slice(0, LIMIT)
          .filter((value, index, array) => array.findIndex(item => item.link === value.link) === index)

        setCache(key, items)
      }

      return items.map(item => ({
        title: item.title,
        link: 'https://archive.ph/' + encodeURIComponent(String(item.link || '').replace(/\?.*/, '')),
        label: source.label,
      }))
    }

    async function fetchAll() {
      initPills()

      const settled = await Promise.allSettled(
        SOURCES.map(async source => {
          const items = await fetchSource(source)
          setPillState(source.label, 'ok')
          return items
        }),
      )

      const good = []
      const failed = []

      settled.forEach((result, index) => {
        if (result.status === 'fulfilled') {
          good.push(...result.value)
          return
        }

        const label = SOURCES[index].label
        setPillState(label, 'err')
        failed.push(label)
        console.warn(`[headlines] ${label} failed:`, result.reason?.message)
      })

      if (!good.length) throw new Error(`all feeds failed: ${failed.join(', ')}`)
      return good
    }

    function makeItems(items) {
      const fragment = document.createDocumentFragment()

      for (const item of items) {
        const a = document.createElement('a')
        a.className = 'marquee-item'
        a.href = item.link
        a.target = '_blank'
        a.rel = 'noopener'

        const badge = document.createElement('span')
        badge.className = 'src-badge'
        badge.textContent = item.label

        const headline = document.createElement('span')
        headline.className = 'headline'
        headline.textContent = item.title

        const sep = document.createElement('span')
        sep.className = 'sep'
        sep.textContent = '◆'

        a.append(badge, headline, sep)
        fragment.appendChild(a)
      }

      return fragment
    }

    function normalise(offset, halfWidth) {
      if (halfWidth <= 0) return 0
      let o = offset % halfWidth
      if (o > 0) o -= halfWidth
      if (o <= -halfWidth) o += halfWidth
      return o
    }

    function attachDrag(state, hitArea) {
      let pointerId = null
      let down = false
      let moved = false

      hitArea.addEventListener('pointerdown', event => {
        if (event.button !== undefined && event.button !== 0) return
        down = true
        moved = false
        pointerId = event.pointerId
        state.dragging = false
        state.dragStartX = event.clientX
        state.dragStartOffset = state.offset
        state.dragDelta = 0
        state.pointerType = event.pointerType || 'mouse'
        state.inertiaV = 0
        state.moveSamples = [{x: event.clientX, t: performance.now()}]
        startRaf()
      })

      hitArea.addEventListener('pointermove', event => {
        if (!down || event.pointerId !== pointerId) return

        state.dragDelta = event.clientX - state.dragStartX

        if (!moved && Math.abs(state.dragDelta) > 4) {
          moved = true
          state.dragging = true
          hitArea.setPointerCapture(event.pointerId)
          hitArea.classList.add('dragging')
        }

        if (!moved) return
        state.offset = state.dragStartOffset + state.dragDelta

        const now = performance.now()
        state.moveSamples.push({x: event.clientX, t: now})
        state.moveSamples = state.moveSamples.filter(sample => now - sample.t <= 120)
      })

      function endDrag(event) {
        if (!down || event.pointerId !== pointerId) return
        down = false

        if (state.dragging) {
          const samples = state.moveSamples || []
          const first = samples[0]
          const last = samples[samples.length - 1]
          state.dragging = false
          hitArea.classList.remove('dragging')
          state.offset = normalise(state.offset, state.halfWidth)

          if (first && last && last.t !== first.t) {
            const velocity = ((last.x - first.x) / (last.t - first.t)) * 1000
            state.inertiaV = Math.max(-1400, Math.min(1400, velocity))
          }

          hitArea.classList.add('drag-end')
          setTimeout(() => hitArea.classList.remove('drag-end'), 150)
          startRaf()
        }

        pointerId = null
      }

      hitArea.addEventListener('pointerup', endDrag)
      hitArea.addEventListener('pointercancel', event => {
        state.inertiaV = 0
        endDrag(event)
      })
      hitArea.addEventListener('click', event => {
        if (Math.abs(state.dragDelta) > 4) {
          event.preventDefault()
          event.stopPropagation()
        }
      }, true)
    }

    let rafRunning = false
    let rafLast = null
    const FRAME_MS = 1000 / 30

    function needsAnimation() {
      return allStates.some(state =>
        state.dragging ||
        Math.abs(state.pps) > 0.001 ||
        Math.abs(state.inertiaV || 0) > 0.5,
      )
    }

    function startRaf() {
      if (rafRunning || !allStates.length || document.hidden || !needsAnimation()) return
      rafRunning = true
      rafLast = null
      requestAnimationFrame(frame)
    }

    function frame(timestamp) {
      if (document.hidden || !needsAnimation()) {
        rafRunning = false
        rafLast = null
        return
      }

      const dt = Math.min((timestamp - (rafLast ?? timestamp)) / 1000, 0.05)
      rafLast = timestamp

      for (const state of allStates) {
        if (!state.dragging) {
          const inertia = state.inertiaV || 0
          state.offset += (state.pps + inertia) * dt
          state.offset = normalise(state.offset, state.halfWidth)

          if (Math.abs(inertia) > 0.5) {
            state.inertiaV *= Math.pow(0.9, dt * 60)
            if (Math.abs(state.inertiaV) < 6) state.inertiaV = 0
          }
        }

        state.el.style.transform = `translateX(${state.offset}px)`
      }

      setTimeout(() => requestAnimationFrame(frame), FRAME_MS - 6)
    }

    document.addEventListener('visibilitychange', () => {
      if (!document.hidden) startRaf()
    })

    function shuffleItems(items) {
      const out = [...items]

      for (let i = out.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1))
          ;[out[i], out[j]] = [out[j], out[i]]
      }

      return out
    }

    function enoughItems(items, fallback) {
      return items.length >= 6 ? items : fallback
    }

    function buildRow(items, rowIndex) {
      const config = ROW_CONFIGS[rowIndex % ROW_CONFIGS.length]
      const el = document.createElement('div')
      el.className = `marquee-row row-${rowIndex % 4}`
      el.appendChild(makeItems(items))
      el.appendChild(makeItems(items))

      const basePps = config.dir === 'rtl' ? -config.speed : config.speed
      const state = {
        el,
        halfWidth: 1,
        basePps,
        pps: basePps * speedMultiplier,
        dir: config.dir,
        offset: 0,
        dragging: false,
        dragStartX: 0,
        dragStartOffset: 0,
        dragDelta: 0,
        pointerType: 'mouse',
        inertiaV: 0,
        moveSamples: [],
      }

      allStates.push(state)
      return state
    }


    function clamp(n, min, max) {
      return Math.max(min, Math.min(max, n))
    }

    function getStageRowTarget(stage, sampleRow) {
      if (!stage || !sampleRow) return MIN_STAGE_ROWS

      const stageHeight = stage.clientHeight || window.innerHeight || 1
      const sampleHeight = sampleRow.getBoundingClientRect().height || 1
      const styles = window.getComputedStyle(stage)
      const rowGap = parseFloat(styles.rowGap || styles.gap || '0') || 0
      const rowStep = Math.max(1, sampleHeight + rowGap)
      const needed = Math.ceil((stageHeight + STAGE_FILL_BUFFER_PX + rowGap) / rowStep)

      return clamp(needed, MIN_STAGE_ROWS, MAX_STAGE_ROWS)
    }

    function queueStageRebuild(delay = STAGE_REBUILD_DELAY_MS) {
      if (!currentItems.length) return
      window.clearTimeout(stageRebuildTimer)
      stageRebuildTimer = window.setTimeout(() => {
        stageRebuildTimer = 0
        buildStage(currentItems)
      }, delay)
    }

    function buildStage(allItems) {
      const stage = document.getElementById('stage')
      const statusEl = document.getElementById('status')
      if (!stage || !statusEl) return

      stage.innerHTML = ''
      statusEl.classList.add('hidden')
      allStates = []

      const byLabel = Object.fromEntries(SOURCES.map(source => [source.label, []]))
      for (const item of allItems) byLabel[item.label]?.push(item)

      const intl = [...byLabel.BBC, ...byLabel.RTR, ...byLabel.GRDN]
      const pools = [
        enoughItems(byLabel.NYT, allItems),
        enoughItems(byLabel.WAPO, allItems),
        enoughItems(intl, allItems),
        enoughItems(byLabel.AP, allItems),
      ]

      let rowIndex = 0

      function appendRow(pool, index) {
        const hitArea = document.createElement('div')
        const state = buildRow(shuffleItems(pool), index)
        hitArea.className = 'marquee-stage'
        hitArea.appendChild(state.el)
        stage.appendChild(hitArea)
        attachDrag(state, hitArea)
      }

      appendRow(pools[rowIndex % pools.length], rowIndex)
      rowIndex += 1

      const targetRows = getStageRowTarget(stage, stage.lastElementChild)
      while (rowIndex < targetRows) {
        appendRow(pools[rowIndex % pools.length], rowIndex)
        rowIndex += 1
      }

      requestAnimationFrame(() => {
        for (const state of allStates) {
          state.halfWidth = state.el.scrollWidth / 2 || 1
          state.offset = state.dir === 'rtl' ? 0 : -state.halfWidth
        }

        applySpeed()
        startRaf()
      })
    }

    function randomizeCurrentItems() {
      if (!currentItems.length) return
      const stage = document.getElementById('stage')
      stage?.classList.add('answer-cut')

      window.setTimeout(() => {
        buildStage(shuffleItems(currentItems))
        stage?.classList.remove('answer-cut')
        stage?.classList.add('answer-cut-settle')
        window.setTimeout(() => stage?.classList.remove('answer-cut-settle'), 220)
      }, 80)
    }

    document.getElementById('shakeButton')?.addEventListener('click', randomizeCurrentItems)
    document.addEventListener('keydown', event => {
      if (event.key.toLowerCase() !== 'z') return
      if (event.metaKey || event.ctrlKey || event.altKey) return
      const target = event.target
      if (target instanceof HTMLInputElement || target instanceof HTMLTextAreaElement || target?.isContentEditable) return
      event.preventDefault()
      randomizeCurrentItems()
    })

    async function refresh() {
      const statusEl = document.getElementById('status')
      statusEl?.classList.remove('hidden', 'err')
      if (statusEl) statusEl.textContent = 'fetching feeds…'

      try {
        currentItems = await fetchAll()
        buildStage(currentItems)
      } catch (error) {
        if (statusEl) {
          statusEl.textContent = `feed error: ${error.message}`
          statusEl.classList.add('err')
        }
      }
    }

    const stageResizeTarget = document.getElementById('stage')
    if ('ResizeObserver' in window && stageResizeTarget) {
      let lastStageHeight = 0
      const stageResizeObserver = new ResizeObserver(entries => {
        const nextHeight = Math.round(entries[0]?.contentRect?.height || 0)
        if (Math.abs(nextHeight - lastStageHeight) < 4) return
        lastStageHeight = nextHeight
        queueStageRebuild(120)
      })
      stageResizeObserver.observe(stageResizeTarget)
    } else {
      window.addEventListener('resize', () => queueStageRebuild(120))
    }

    refresh()
    setInterval(refresh, REFRESH_MS)
  </script>
</body>
